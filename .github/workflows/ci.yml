name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs for the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install tmux (for generic_tmux integration tests)
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install the project
        run: uv sync --locked --all-extras

      - name: Run tests
        run: uv run pytest -q

  version-sync:
    name: version-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Check every version field agrees
        run: uv run --no-project python scripts/sync_version.py --check

  lint:
    name: lint (trunk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Trunk needs full history for diff-aware checks.
          fetch-depth: 0

      - name: Trunk Check
        uses: trunk-io/trunk-action@v1
