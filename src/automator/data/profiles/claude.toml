# Claude Code. Reference profile for the claude-settings-json hook dialect.
name = "claude"
binary = "claude"
prompt_template = "{prompt}"
bypass_args = ["--permission-mode", "bypassPermissions"]
model_flag = "--model"
usage_parser = "claude-jsonl"
first_run_note = "run `claude` once in the project to accept workspace trust and hooks approval"
skill_tree = ".claude/skills"
# Gitignored configs a worktree checkout omits: project MCP servers (.mcp.json)
# and Claude settings. .claude/settings.json is also the hook config_path — it is
# seeded first, then the Stop hook is merged into it (see provision_worktree).
seed_files = [
  ".mcp.json",
  ".claude/settings.json",
  ".claude/settings.local.json",
]

[hooks]
dialect = "claude-settings-json"
config_path = ".claude/settings.json"
events = { SessionStart = "SessionStart", Stop = "Stop", SessionEnd = "SessionEnd", PreCompact = "PreCompact" }
