# Bundled Test Architect Enterprise (TEA) plugin for bmad-auto.
#
# Wires the BMAD "Test Architect Enterprise" module (the "Murat" agent + its
# `bmad-testarch-*` workflows) into every run and sweep as advisory-by-default
# quality steps. It assumes TEA is already installed in the project
# (`npx bmad-method install` -> Test Architect), and orchestrates by injecting
# natural-language sessions that invoke the relevant TEA workflow at the two
# stages that have a live worktree:
#
#   post_dev_phase     test-design (TD) + atdd (AT) + automate (TA)   [role=dev]
#   post_review_result trace (TR) + nfr (NR) + test-review (RV)       [role=review]
#
# Because sweep bundles run the same inherited dev/review pipeline, these
# workflows fire for runs AND sweep bundles with no sweep-specific code.
#
# Opt in from .automator/policy.toml:
#   [plugins]
#   enabled = ["tea"]            # [python] readiness gate loads only when enabled
#
#   [plugins.tea]
#   # every step is on + advisory by default; flip what you need:
#   nfr_blocking = true          # escalate (don't commit) when the NFR gate fails
#   atdd_enabled = false         # skip the ATDD generation step
#
# The per-step `<name>_enabled` / `<name>_blocking` settings use the generic
# plugin-system workflow-overlay convention (see docs/plugin-authoring-guide.md,
# "Making a workflow configurable"). Generation steps (td/atdd/automate) ship
# advisory; the gate steps operators are likely to enforce (trace/nfr/review)
# expose a `*_blocking` flag — when true, a FAIL/CONCERNS gate verdict escalates
# the unit at commit time (enforcement: `TeaPlugin.on_pre_commit`).

[plugin]
name = "tea"
version = "1.0.0"
api_version = 1
description = "Inject the BMAD Test Architect Enterprise (TEA) workflows as advisory-by-default quality steps across runs and sweeps."
author = "bmad-auto"
# TEA's runtime + its compiled per-CLI skills are gitignored / not guaranteed in
# a fresh checkout, so prime them into an isolated per-worktree checkout. No-ops
# under today's in-place (isolation = none) mode; needed once worktrees are used.
seed_globs = [
  "_bmad/**",               # TEA runtime: config.yaml + testarch workflows + knowledge base
  ".claude/skills/bmad-t*", # compiled TEA skills for claude-code (bmad-tea + bmad-testarch-*)
  ".agents/skills/bmad-t*", # codex/cursor compiled skill home
  ".gemini/skills/bmad-t*", # gemini compiled skill home
  ".agent/skills/bmad-t*",  # generic agent compiled skill home
]

# In-process module. Trust-gated: never imported unless "tea" is in
# [plugins] enabled. Owns the readiness gate (validate) and the blocking-gate
# enforcement at pre_commit (on_pre_commit).
[python]
module = "tea_plugin.py"
class = "TeaPlugin"

# ----------------------------------------------------------------- settings

# Readiness gate. With this on (default), a run fails fast at startup if TEA is
# not installed in the project; turn it off to let the workflows degrade to
# advisory prompts even when TEA is absent.
[[settings]]
key = "require_tea"
type = "bool"
default = true
label = "Require TEA installed"
help = "Fail fast at startup if the project has no _bmad/tea/config.yaml (TEA not installed). false = run anyway."

# Per-step enable flags (workflow-overlay convention: <name>_enabled). Every
# step ships on; set one false to drop just that workflow.
[[settings]]
key = "td_enabled"
type = "bool"
default = true
label = "Enable test-design (TD)"
help = "post_dev_phase: risk assessment + coverage strategy for the changes (bmad-testarch-test-design)."

[[settings]]
key = "atdd_enabled"
type = "bool"
default = true
label = "Enable ATDD (AT)"
help = "post_dev_phase: failing acceptance tests + implementation checklist (bmad-testarch-atdd)."

[[settings]]
key = "automate_enabled"
type = "bool"
default = true
label = "Enable automate (TA)"
help = "post_dev_phase: prioritized API/E2E tests, fixtures, DoD summary (bmad-testarch-automate)."

[[settings]]
key = "trace_enabled"
type = "bool"
default = true
label = "Enable trace (TR)"
help = "post_review_result: map requirements to tests + record the quality-gate decision (bmad-testarch-trace)."

[[settings]]
key = "nfr_enabled"
type = "bool"
default = true
label = "Enable NFR (NR)"
help = "post_review_result: assess non-functional requirements + record the gate decision (bmad-testarch-nfr)."

[[settings]]
key = "review_enabled"
type = "bool"
default = true
label = "Enable test-review (RV)"
help = "post_review_result: quality check against the written tests (bmad-testarch-test-review)."

# Per-gate blocking flags (workflow-overlay convention: <name>_blocking). The
# gate steps ship advisory; flip one true so a FAIL/CONCERNS verdict escalates
# the unit at commit instead of landing (enforcement: TeaPlugin.on_pre_commit).
# Generation steps stay advisory by design, so they expose no flag.
[[settings]]
key = "trace_blocking"
type = "bool"
default = false
label = "Block on trace gate"
help = "true = a failing trace (requirements-traceability) gate escalates the unit at commit instead of committing."

[[settings]]
key = "nfr_blocking"
type = "bool"
default = false
label = "Block on NFR gate"
help = "true = a failing NFR gate escalates the unit at commit instead of committing."

[[settings]]
key = "review_blocking"
type = "bool"
default = false
label = "Block on test-review gate"
help = "true = a failing test-review gate escalates the unit at commit instead of committing."

# ---------------------------------------------------------------- workflows

# Prompts are CLI-agnostic: a natural-language intent plus the explicit TEA
# workflow/skill name, phrased around the changes in the working tree for
# {story_key} so they work for a single story AND a sweep bundle.

[workflows.td]
stage = "post_dev_phase"
role = "dev"
prompt = "Run the TEA Test Design workflow (skill `bmad-testarch-test-design`) for `{story_key}`. Produce a risk assessment and a risk-based coverage strategy for the changes currently in the working tree, and write the artifacts under TEA's configured test_artifacts directory. Do not modify production code."
blocking = false

[workflows.atdd]
stage = "post_dev_phase"
role = "dev"
prompt = "Run the TEA ATDD workflow (skill `bmad-testarch-atdd`) for `{story_key}`. Generate failing acceptance tests plus an implementation checklist covering the changes currently in the working tree, written under TEA's configured test_artifacts directory."
blocking = false

[workflows.automate]
stage = "post_dev_phase"
role = "dev"
prompt = "Run the TEA Test Automation workflow (skill `bmad-testarch-automate`) for `{story_key}`. Generate prioritized API/E2E tests and fixtures for the changes currently in the working tree, plus a Definition-of-Done summary, under TEA's configured test_artifacts directory."
blocking = false

[workflows.trace]
stage = "post_review_result"
role = "review"
prompt = "Run the TEA Trace Requirements workflow (skill `bmad-testarch-trace`) for `{story_key}`. Map the requirements to the tests covering the changes currently in the working tree and record the quality-gate decision under TEA's configured test_artifacts directory."
blocking = false

[workflows.nfr]
stage = "post_review_result"
role = "review"
prompt = "Run the TEA Non-Functional Requirements workflow (skill `bmad-testarch-nfr`) for `{story_key}`. Assess the NFRs of the changes currently in the working tree and record the gate decision under TEA's configured test_artifacts directory."
blocking = false

[workflows.review]
stage = "post_review_result"
role = "review"
prompt = "Run the TEA Test Review workflow (skill `bmad-testarch-test-review`) for `{story_key}`. Perform a quality check against the tests covering the changes currently in the working tree, using TEA's knowledge base and best practices, and record findings under TEA's configured test_artifacts directory."
blocking = false
